name: Build Working Rumble
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Interface
        # Твоя первая ссылка (Оболочка)
        run: git clone https://github.com/RumbleOrg/Rumble .

      - name: Checkout Engine
        # Твоя вторая ссылка (Движок ByeDPI)
        run: git clone https://github.com/hufrea/byedpi engine

      - name: Build Engine (C Core)
        run: |
          cd engine
          # Компилируем движок ByeDPI из всех исходников C для iPhone (arm64)
          xcrun --sdk iphoneos clang -arch arm64 -miphoneos-version-min=15.0 \
          main.c conev.c desync.c extend.c mpool.c packets.c proxy.c \
          -o byedpi-core
          cd ..

      - name: Create Project and Bundle
        run: |
          gem install xcodeproj
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.new('Rumble.xcodeproj')
          target = project.new_target(:application, 'Rumble', :ios, '15.0')
          target.build_configurations.each { |c| c.build_settings['INFOPLIST_FILE'] = 'Info.plist' }
          # Добавляем файлы интерфейса из твоей первой ссылки
          Dir.glob('*.{h,m}').each { |f| target.add_file_references([project.main_group.new_file(f)]) }
          project.save
          "
          
          # Создаем Info.plist
          cat <<EOF > Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>Rumble</string>
              <key>CFBundleIdentifier</key><string>com.rumble.byedpi</string>
              <key>CFBundleName</key><string>Rumble</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.0</string>
              <key>LSRequiresIPhoneOS</key><true/>
              <key>MinimumOSVersion</key><string>15.0</string>
          </dict>
          </plist>
          EOF

      - name: Build Final IPA
        run: |
          # Собираем интерфейс из первой ссылки
          xcodebuild -project Rumble.xcodeproj -scheme Rumble -sdk iphoneos -configuration Release \
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build
          
          mkdir -p Payload
          # Ищем готовую папку приложения
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Rumble.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "Rumble.app" -type d | head -n 1)
          fi
          
          # Вкладываем скомпилированный движок из второй ссылки внутрь приложения
          cp engine/byedpi-core "$APP_PATH/"
          
          cp -r "$APP_PATH" Payload/
          zip -r Rumble.ipa Payload

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Rumble-With-Engine-IPA
          path: Rumble.ipa
